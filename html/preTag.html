<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRE TAG</title>
</head>
<body>
    <pre>
        This is a preformatted text.
        It preserves both spaces and line breaks. lot of text needed br and hr but here
        we can write as it is and it will be displayed as it is.
    </pre><hr>
    <p>
        (a+b)<sup>2</sup>=a<sup>2</sup>+b<sup>2</sup>+2ab  <!--sup tag for superscript and sub tag for subscript-->
    </p>
</body>
</html>
