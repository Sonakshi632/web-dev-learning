<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border="1">
        <caption>My Details</caption>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
            </tr>
        <tr>
            <td>Sonakshi Shukla</td>
            <td>20</td>
            <td>Kanpur</td>
        <tr>
            <td colspan="3"> Hi there !</td>
        </tr>
</body>
</html>
