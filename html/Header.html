<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Tags</title>
</head>
<body>
    <header>This basically gives us a main heading of a page</header>
    <hr><main>
        <section> 
            <h2>sub heading 1</h2>
        </section> <!--section is always within main-->

            <h3>sub heading 2</h3>
        </section>

    </main>
